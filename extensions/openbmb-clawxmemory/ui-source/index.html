<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>ClawXMemory</title>
    <link rel="icon" type="image/png" href="./assets/brand/logo.png" />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="app-shell">
      <div id="appScrim" class="app-scrim"></div>

      <aside class="nav-rail" id="navRail">
        <div class="nav-header">
          <div class="nav-brand">
            <div class="brand-logo-wrap">
              <img class="brand-logo" src="./assets/brand/logo.png" alt="" />
            </div>
            <div class="brand-text">
              <span class="brand-subtitle">控制</span>
              <h1>ClawXMemory</h1>
            </div>
          </div>
          <button id="navCloseBtn" class="drawer-close nav-close" type="button" aria-label="Close">&#x2715;</button>
        </div>

        <nav id="boardNavTabs" class="nav-list">
          <button class="nav-item active" data-page="project" type="button">
            <span class="nav-label" data-i18n="nav.project">项目记忆</span>
            <span class="nav-count" data-count-for="project">0</span>
          </button>
          <button class="nav-item" data-page="user" type="button">
            <span class="nav-label" data-i18n="nav.user">用户画像</span>
            <span class="nav-count" data-count-for="user">0</span>
          </button>
          <button class="nav-item" data-page="memory_trace" type="button">
            <span class="nav-label" data-i18n="nav.memory_trace">记忆追踪</span>
            <span class="nav-count" data-count-for="memory_trace">0</span>
          </button>
        </nav>

        <div class="nav-spacer"></div>

        <div class="nav-bottom">
          <div class="nav-popover" id="settingsPopover">
            <button class="popover-item" id="overviewToggleBtn" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              <span data-i18n="topbar.overview">仪表盘</span>
            </button>

            <div class="popover-divider"></div>

            <button class="popover-section-toggle" id="advancedSettingsToggle" type="button">
              <svg class="popover-section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              <span data-i18n="settings.advanced">参数设置</span>
            </button>
            <div class="popover-section-body" id="advancedSettingsBody">
              <div class="popover-section-inner">
                <div class="popover-group popover-group-stack" id="autoIndexIntervalWrap">
                  <span class="popover-label" data-i18n="settings.autoIndexInterval">自动索引间隔（小时）</span>
                  <input id="autoIndexIntervalHoursInput" class="popover-input" type="number" min="0" step="1" placeholder="1" />
                  <span class="popover-note" data-i18n="settings.scheduleHint">0 表示关闭自动任务</span>
                </div>
                <div class="popover-group popover-group-stack" id="autoDreamIntervalWrap">
                  <span class="popover-label" data-i18n="settings.autoDreamInterval">自动 Dream 间隔（小时）</span>
                  <input id="autoDreamIntervalHoursInput" class="popover-input" type="number" min="0" step="1" placeholder="6" />
                  <span class="popover-note" data-i18n="settings.autoDreamHint">只有自上次 Dream 以来有记忆文件更新时，自动 Dream 才会真正执行。</span>
                </div>
                <button class="popover-item popover-save" id="saveSettingsBtn" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                  <span data-i18n="settings.save">保存设置</span>
                </button>
              </div>
            </div>

            <div class="popover-divider"></div>

            <div class="popover-group">
              <span class="popover-label" data-i18n="settings.theme">主题</span>
              <div class="popover-seg" id="themeToggle">
                <button data-theme-value="light" type="button" class="popover-seg-btn active" title="浅色">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
                <button data-theme-value="dark" type="button" class="popover-seg-btn" title="深色">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <button data-theme-value="auto" type="button" class="popover-seg-btn" title="跟随系统">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                </button>
              </div>
            </div>

            <div class="popover-group">
              <span class="popover-label" data-i18n="settings.accentColor">主题色</span>
              <div class="accent-picker" id="accentPicker">
                <button class="accent-dot accent-dot--blue active" data-accent="blue" type="button" title="蓝色"></button>
                <button class="accent-dot accent-dot--green" data-accent="green" type="button" title="绿色"></button>
                <button class="accent-dot accent-dot--gray" data-accent="gray" type="button" title="灰色"></button>
              </div>
            </div>

            <div class="popover-group">
              <span class="popover-label" data-i18n="settings.language">语言</span>
              <div class="popover-seg" id="langToggle">
                <button data-locale="zh" type="button" class="popover-seg-btn active">文</button>
                <button data-locale="en" type="button" class="popover-seg-btn">A</button>
              </div>
            </div>

            <div class="popover-divider"></div>

            <button class="popover-section-toggle" id="dataManagementToggle" type="button">
              <svg class="popover-section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              <span data-i18n="settings.dataManagement">数据管理</span>
            </button>
            <div class="popover-section-body" id="dataManagementBody">
              <div class="popover-section-inner">
                <button class="popover-item" id="exportMemoryBtn" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  <span data-i18n="settings.export">导出记忆</span>
                </button>
                <button class="popover-item" id="importMemoryBtn" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  <span data-i18n="settings.import">导入记忆</span>
                </button>
                <button class="popover-item popover-danger" id="clearMemoryBtn" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                  <span data-i18n="settings.clear">清除记忆</span>
                </button>
              </div>
            </div>
          </div>
          <button class="nav-menu-trigger" id="navMenuTrigger" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span data-i18n="topbar.settings">设置</span>
          </button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="topbar-leading">
            <button id="navToggleBtn" class="icon-btn nav-toggle" type="button" aria-label="Menu">☰</button>
            <div>
              <h2 data-i18n="topbar.title">记忆看板</h2>
              <p id="activityText" class="activity-text" data-i18n="topbar.idle">等待操作</p>
            </div>
          </div>

          <div class="toolbar">
            <button class="topbar-action-btn" id="refreshBtn" type="button" title="刷新">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              <span data-i18n="topbar.refresh">刷新</span>
            </button>
            <button class="topbar-action-btn" id="buildNowBtn" type="button" title="索引同步">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
              <span data-i18n="topbar.build">索引同步</span>
            </button>
            <button class="topbar-action-btn" id="dreamRunBtn" type="button" title="Dream">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.6 5.3 5.9.9-4.2 4.1 1 5.8L12 16.8 6.7 19.1l1-5.8-4.2-4.1 5.9-.9L12 3z"/></svg>
              <span data-i18n="topbar.dream">Dream</span>
            </button>
            <span class="topbar-divider-v"></span>
            <span class="topbar-index-info">
              <span class="topbar-index-label" data-i18n="nav.lastIndexed">最近索引</span>
              <span id="navLastIndexed" class="topbar-index-time" data-i18n="nav.waiting">等待索引</span>
            </span>
          </div>
        </header>

        <section class="stream-panel command-center" id="commandCenter">
          <div class="panel-head">
            <div class="panel-title-row">
              <h3 id="browserTitle">项目记忆</h3>
              <span id="browserMeta" class="panel-meta">0</span>
            </div>

            <div class="search-row" id="listSearchRow">
              <input
                id="listQueryInput"
                type="text"
                autocomplete="off"
                data-i18n="stream.searchPlaceholder"
                data-i18n-attr="placeholder"
                placeholder="搜索当前层级"
              />
              <button id="listSearchBtn" class="tool-btn" type="button" data-i18n="stream.search">搜索</button>
              <button id="listClearBtn" class="tool-btn search-clear-btn" type="button" style="display:none" data-i18n="stream.clear">清空</button>
            </div>
          </div>
          <div class="board-scroll" id="boardScroll">
            <div class="board-content board-active" id="projectListBoard"></div>
            <div class="board-content" id="projectDetailBoard">
              <section class="page-shell">
                <div class="page-head page-head--project">
                  <div class="page-head-main">
                    <button id="projectDetailBackBtn" class="tool-btn page-back-btn" type="button" data-i18n="detail.backToList">返回项目列表</button>
                    <div class="page-head-copy">
                      <h3 id="projectDetailTitle">项目详情</h3>
                      <p id="projectDetailSubtitle" class="page-subtitle"></p>
                    </div>
                  </div>
                  <div id="projectDetailHeadActions" class="page-head-actions"></div>
                </div>
                <div id="projectDetailMeta" class="detail-meta"></div>
                <div id="projectDetailBody" class="page-detail-body"></div>
              </section>
            </div>
            <div class="board-content" id="fileDetailBoard">
              <section class="page-shell">
                <div class="page-head">
                  <button id="fileDetailBackBtn" class="tool-btn page-back-btn" type="button" data-i18n="detail.backToProject">返回项目</button>
                  <div class="page-head-copy">
                    <h3 id="fileDetailTitle" data-i18n="detail.title">记录详情</h3>
                    <p id="fileDetailSubtitle" class="page-subtitle"></p>
                  </div>
                </div>
                <div id="fileDetailMeta" class="detail-meta"></div>
                <div id="fileDetailBody" class="page-detail-body"></div>
              </section>
            </div>
            <div class="board-content" id="tmpBoard"></div>
            <div class="board-content" id="userBoard"></div>
            <div class="board-content" id="memoryTraceBoard"></div>
          </div>
        </section>
      </main>
    </div>

    <aside class="side-drawer overview-drawer" id="overviewPanel">
      <div class="drawer-header">
        <h3 data-i18n="overview.title">运行概览</h3>
        <button id="overviewCloseBtn" class="drawer-close" type="button" aria-label="Close">&#x2715;</button>
      </div>
      <div class="drawer-section drawer-fill">
        <div class="overview-scroll" id="overviewScroll">
          <section id="overviewCards" class="overview-strip"></section>
        </div>
      </div>
    </aside>

    <!-- settings drawer removed — all settings now in popover menu -->

    <!-- Modal dialog -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-card" id="modalCard">
        <div class="modal-icon" id="modalIcon"></div>
        <h3 class="modal-title" id="modalTitle"></h3>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-fields" id="modalFields"></div>
        <div class="modal-actions">
          <button class="modal-btn modal-cancel" id="modalCancel" type="button"></button>
          <button class="modal-btn modal-confirm" id="modalConfirm" type="button"></button>
        </div>
      </div>
    </div>

  <input id="importMemoryInput" type="file" accept="application/json,.json" hidden />

  <script type="module" src="./app.js"></script>
</body>
</html>
